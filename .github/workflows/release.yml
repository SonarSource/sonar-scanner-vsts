name: sonar-release

# This workflow is triggered when publishing a new github release
on:
  push:
    branches:
      - "**"
  # release:
  #   types:
  #     - published

jobs:
  release:
    permissions:
      id-token: write
      contents: write
    uses: SonarSource/gh-action_release/.github/workflows/main.yaml@6.0.0
    with:
      # publishToBinaries: false
      dryRun: true
      slackChannel: team-sc-azdo-extension-release-notif
    inputs:
      version: 1.2.3.123123
